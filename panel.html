<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account &amp; Subscription Shortcuts</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container">
    <div class="window-toolbar">
      <button type="button" id="btnClose" class="btn-close" data-i18n="closeWindow">Close</button>
    </div>

    <header>
      <div class="header-row">
        <div>
          <h1 data-i18n="title">Account &amp; Subscription Shortcuts</h1>
          <p class="subtitle" data-i18n="subtitle">Official pages in a new tab—sign in on the site as usual.</p>
        </div>
        <div class="language-selector">
          <label for="languageSelect" class="language-label" data-i18n="language">Language</label>
          <select id="languageSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </div>
      </div>
    </header>

    <section class="personal-toolbar" aria-label="Personal shortcuts">
      <button type="button" id="btnAddPersonal" class="btn-add-personal" data-i18n="addPersonal">Add my shortcut</button>
      <div id="personalForm" class="personal-form hidden">
        <h3 id="personalFormTitle" class="personal-form-title"></h3>
        <div class="form-row">
          <label for="personalLabel" id="labelForName" data-i18n="formLabel">Name</label>
          <input type="text" id="personalLabel" autocomplete="off" maxlength="120" />
        </div>
        <div class="form-row">
          <label for="personalUrl" id="labelForUrl" data-i18n="formUrl">URL</label>
          <input type="url" id="personalUrl" inputmode="url" autocomplete="off" maxlength="2048" placeholder="https://…" />
        </div>
        <div class="form-row">
          <label for="personalCategory" id="labelForCategory" data-i18n="formCategory">Section</label>
          <select id="personalCategory" aria-describedby="labelForCategory"></select>
        </div>
        <p id="personalFormError" class="form-error" role="alert" hidden></p>
        <div class="form-actions">
          <button type="button" id="btnSavePersonal" class="btn-primary" data-i18n="savePersonal">Save</button>
          <button type="button" id="btnCancelPersonal" class="btn-secondary" data-i18n="cancelForm">Cancel</button>
        </div>
      </div>
    </section>

    <main id="shortcuts-root" aria-live="polite"></main>

    <footer>
      <p class="note" data-i18n="note">Shortcuts only. This extension does not access your accounts.</p>
      <p class="note note-secondary" data-i18n="windowHint">You can move and resize this window. Links open in the browser; this panel stays open until you close it.</p>
      <p class="extension-version" id="extensionVersion"></p>
      <a
        class="a4c-brand-footer a4c-brand-footer--strip"
        id="a4c-brand-footer"
        href="https://ai4context.com/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="a4c-brand-footer__accent" aria-hidden="true"></span>
        <img
          class="a4c-brand-footer__mark"
          src="brand/mark-ai4context.png"
          width="22"
          height="22"
          alt=""
          decoding="async"
        />
        <span class="a4c-brand-footer__copy">
          <span class="a4c-brand-footer__by"><span id="a4c-brand-by-prefix">by</span></span>
          <strong class="a4c-brand-footer__name">AI4Context</strong>
        </span>
      </a>
    </footer>
  </div>
  <script src="shortcuts-data.js"></script>
  <script src="panel.js"></script>
</body>
</html>
